<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passion</title>
    <style>
        body{
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        main {
            flex: 1;
        }
        header, footer {
            flex: 0;
            text-align: center;
        }
        header {
            background-image: url(header.jpg);
            background-repeat: no-repeat;
            background-size: cover;
            color: white;
        }
        nav {
            background-color: skyblue;
        }
        nav ul {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            align-items: center;
            list-style: none;
        }
        nav ul li {
            flex: 1;
        }
        nav ul li a {
            text-decoration: none;
        }
        img {
            box-shadow: 2px 2px 5px;
        }
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header><h1>Passion</h1></header>
    <nav>
        <ul>
            <li><a href="#intro">Introduction</a></li>
            <li><a href="#debat">Débat</a></li>
            <li><a href="#opinion">Votre opinion</a></li>
            <li><a href="#ref">Références</a></li>
        </ul>
    </nav>
    <main>
        <article>
            <section>
                <h3 id="intro">Qu'est-ce que le Chat GPT?</h3>
                <img src="openAI.jfif" alt="OpenAI">
            </section>
            <section>
                <h3 id="debat">Débat: ChatAI va nous aider ou non?</h3>
            </section>
            <section>
                <h3 id="opinion">Votre opinion</h3>
                <form action="" name="formulaire">
                    <label for="name">Vous aimeriez être appelé: </label>
                    <input type="text" name="name" id="name">
                    <label for="comment">Votre opinion</label>
                    <textarea name="comment" id="comment" cols="30" rows="10"></textarea>
                </form>
            </section>
        </article>
        <aside>
            <h3 id="ref">Références</h3>
            <ul>
                <li><a href="https://fr.wikipedia.org/wiki/ChatGPT">ChatGPT</a></li>
                <li><a href="https://openai.com/api/">OpenAI</a></li>
            </ul>
        </aside>
    </main>
    <footer>Tous droits réservés. Dernière mise à jour février 2023.</footer>
</body>
</html>
